<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Avatar Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Smart Avatar</h1>
            <p>Voice-Activated Intelligent Assistant</p>
        </header>

        <main>
            <div class="visualizer-container">
                <div class="avatar-circle" id="avatar">
                    <div class="inner-glow"></div>
                    <div class="pulse-ring"></div>
                </div>
                <div class="status-indicator" id="status">Ready</div>
            </div>

            <div class="conversation-display">
                <div class="chat-bubble user" id="user-text">...</div>
                <div class="chat-bubble assistant" id="assistant-text">How can I help you today?</div>
            </div>

            <div class="controls">
                <button id="mic-btn" class="mic-button">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <div class="text-input-container">
                    <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off">
                    <button id="send-btn" class="send-button">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
